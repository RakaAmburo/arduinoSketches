<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Controller</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .btn {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        .on {
            background: #f44336;
            color: white;
        }
        .off {
            background: #4CAF50;
            color: white;
        }
        #status {
            margin-top: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>ESP Controller</h1>
    <button id="toggleBtn" class="btn off">Turn ON</button>
    <div id="status">Status: OFF</div>
    <script>
        let currentState = "off";
        window.onload = () => statusRequest('/status', 'GET');
        async function statusRequest(url, method, state) {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('toggleBtn');
            btn.disabled = true;
            let options = {
                method: method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (method !== 'GET') {
                options.body = JSON.stringify({ status: state });
            }
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                currentState = data.status;
                if (currentState === "on") {
                    btn.textContent = "Tu4n OFF";
                    btn.className = "btn on";
                    statusEl.textContent = "Device is ON";
                } else {
                    btn.textContent = "Turn ON";
                    btn.className = "btn off";
                    statusEl.textContent = "Device is OFF";
                }
                console.log('Response:', data);
            } catch (error) {
                console.error('Error:', error);
                statusEl.textContent = `Error: ${error.message}`;
            } finally {
                btn.disabled = false;
            }
        }
        function toggleState() {
            statusRequest('/control', 'POST', currentState === "off" ? "on" : "off");
        }
        document.getElementById('toggleBtn').addEventListener('click', toggleState);
    </script>
</body>
</html>
